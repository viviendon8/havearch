<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAVE</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; width:100vw; height:100vh; overflow:hidden; cursor:none; }
  canvas { position:absolute; top:0; left:0; display:block; }
  #hint {
    position:fixed; bottom:40px; left:50%;
    transform:translateX(-50%);
    font-family:"Courier New",monospace;
    font-size:10px; letter-spacing:0.4em; text-transform:uppercase;
    color:#00ff18; text-shadow:0 0 8px #00ff18;
    pointer-events:none; z-index:10;
    animation:blink 1.4s step-start infinite;
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  /* ── Content Protection ─────────────────────────────── */
  img, video {
    -webkit-user-drag: none;
    user-drag: none;
    -webkit-user-select: none;
    user-select: none;
    pointer-events: none;
  }
  a, button, #logo-btn, #logo-btn img, #top-bar, #nav-links a { pointer-events: auto; }

</style>

<body>
<canvas id="c"></canvas>
<div id="hint">[ click to enter ]</div>
<script>
const W = window.innerWidth, H = window.innerHeight;
const c = document.getElementById('c');
c.width = W; c.height = H;
const ctx = c.getContext('2d');
const GREEN = '#00ff18';

// cursor
let mx = W/2, my = H/2, pmx = W/2, pmy = H/2, smoothSpd = 0;

function drawCursor(x, y) {
  const S = 52;
  ctx.save();
  ctx.strokeStyle = GREEN;
  ctx.lineWidth = 3;
  ctx.shadowColor = GREEN;
  ctx.shadowBlur = 6;
  ctx.lineCap = 'square';
  ctx.lineJoin = 'miter';
  ctx.beginPath();
  ctx.moveTo(x, y); ctx.lineTo(x + S, y + S);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + S, y); ctx.lineTo(x, y); ctx.lineTo(x, y + S);
  ctx.stroke();
  ctx.restore();
}

document.addEventListener('mousemove', e => {
  pmx = mx; pmy = my;
  mx = e.clientX; my = e.clientY;
  const s = Math.sqrt((mx-pmx)**2 + (my-pmy)**2);
  smoothSpd = smoothSpd * 0.3 + s * 0.7;
});

const off  = document.createElement('canvas'); // clean source
const comp = document.createElement('canvas'); // composited frame
const tintCanvas = document.createElement('canvas'); // reusable tint buffer
let LX=0, LY=0, LW=0, LH=0, ready=false;

function computeLayout() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const sc = Math.min(vw * 0.58 / img.width, vh * 0.32 / img.height);
  LW = Math.round(img.width * sc);
  LH = Math.round(img.height * sc);
  LX = Math.round((vw - LW) / 2);
  LY = Math.round((vh - LH) / 2);
  c.width = vw; c.height = vh;
  off.width = LW; off.height = LH;
  off.getContext('2d').drawImage(img, 0, 0, LW, LH);
  comp.width = LW; comp.height = LH;
}

img.onload = () => { computeLayout(); ready = true; requestAnimationFrame(loop); };
window.addEventListener('resize', () => { if(ready) computeLayout(); });

// glitch blocks
const blocks = [];
let lastBlock = 0;
const RADIUS_X = 140, RADIUS_Y = 40;

function spawnBlocks(energy) {
  const lmx = mx - LX, lmy = my - LY;
  if(lmy < -RADIUS_Y || lmy > LH + RADIUS_Y) return;
  if(lmx < -RADIUS_X || lmx > LW + RADIUS_X) return;
  const count = 2 + Math.floor(energy * 3);
  for(let i = 0; i < count; i++) {
    const bh = 12 + Math.floor(Math.random() * 24);
    const by = Math.round(lmy + (Math.random()-0.5) * RADIUS_Y * 2 - bh/2);
    if(by < 0 || by + bh > LH) continue;
    const bw = Math.round(RADIUS_X * (0.4 + Math.random() * 0.6));
    const bxOff = Math.round(lmx - RADIUS_X/2 + Math.random() * RADIUS_X - bw/2);
    const clampX = Math.max(0, bxOff);
    const clampW = Math.min(bw, LW - clampX);
    if(clampW <= 4) continue;
    const initDx = (Math.random()-0.5) * energy * 300;
    blocks.push({ srcX: clampX, srcY: by, srcW: clampW, srcH: bh,
                  dx: initDx, vel: 0,
                  life: 1.0, decay: 0.012 + Math.random()*0.018 });
  }
}

let fAmp = 1, fTgt = 1, t = 0;

function loop(ts) {
  t++;
  if(!ready){ requestAnimationFrame(loop); return; }

  const vw = window.innerWidth, vh = window.innerHeight;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, vw, vh);

  const energy = Math.min(smoothSpd / 10, 1);
  smoothSpd *= 0.65;

  if(energy > 0.06 && ts - lastBlock > 45) {
    spawnBlocks(energy); lastBlock = ts;
  }

  if(Math.random()<0.04) fTgt = 0.15+Math.random()*0.85;
  else if(Math.random()<0.06) fTgt = 1;
  fAmp += (fTgt-fAmp)*0.28;
  if(Math.random()<0.01){ fAmp=0.02; fTgt=1; }

  const drift = Math.sin(t*0.03)*1.5 + Math.sin(t*0.071)*0.8;

  // ── build comp: clean logo, punch holes, draw shifted blocks ──────────────
  const cx2 = comp.getContext('2d');
  cx2.clearRect(0, 0, LW, LH);
  cx2.drawImage(off, 0, 0); // start with clean logo

  for(let i = blocks.length-1; i >= 0; i--) {
    const g = blocks[i];
    g.vel += -0.06 * g.dx;
    g.vel *= 0.82;
    g.dx  += g.vel;

    const dx = Math.round(g.dx);
    if(Math.abs(dx) >= 1) {
      // erase original strip
      cx2.clearRect(g.srcX, g.srcY, g.srcW, g.srcH);
      // draw shifted — clip destination to [0, LW] so it doesn't bleed
      const dstX = g.srcX + dx;
      const srcStart = Math.max(0, -dstX);           // skip srcStart px on left if wrapping left
      const dstStart = Math.max(0, dstX);            // start drawing here
      const drawW = Math.min(g.srcW - srcStart, LW - dstStart);
      if(drawW > 0) {
        // reuse pre-allocated tintCanvas
        if(tintCanvas.width < drawW) tintCanvas.width = drawW;
        if(tintCanvas.height < g.srcH) tintCanvas.height = g.srcH;
        const tc = tintCanvas.getContext('2d');
        tc.globalCompositeOperation = 'source-over';
        tc.clearRect(0, 0, drawW, g.srcH);
        tc.drawImage(off, g.srcX + srcStart, g.srcY, drawW, g.srcH, 0, 0, drawW, g.srcH);
        tc.globalCompositeOperation = 'source-in';
        tc.fillStyle = '#9cff70';
        tc.fillRect(0, 0, drawW, g.srcH);
        tc.globalCompositeOperation = 'source-over';
        cx2.save();
        cx2.shadowColor = '#9cff70';
        cx2.shadowBlur = 8;
        cx2.drawImage(tintCanvas, 0, 0, drawW, g.srcH, dstStart, g.srcY, drawW, g.srcH);
        cx2.restore();
      }
    }

    g.life -= g.decay;
    if(g.life <= 0) blocks.splice(i, 1);
  }

  // ── draw to screen — glow uses ONLY the shifted comp, NO separate logo pass ──
  const bx = LX + drift;

  // outer glow (blurred comp — gap areas are transparent, show black through)
  ctx.save();
  ctx.globalAlpha = 0.12 * fAmp;
  ctx.filter = 'blur(28px)';
  ctx.drawImage(comp, bx-14, LY-14, LW+28, LH+28);
  ctx.filter = 'none';
  ctx.restore();

  // sharp comp
  ctx.save();
  ctx.globalAlpha = fAmp;
  ctx.drawImage(comp, bx, LY);
  ctx.restore();

  // mid glow on top of sharp (doesn't fill gaps because gap pixels are transparent)
  ctx.save();
  ctx.globalAlpha = 0.20 * fAmp;
  ctx.filter = 'blur(9px)';
  ctx.drawImage(comp, bx-4, LY-4, LW+8, LH+8);
  ctx.filter = 'none';
  ctx.restore();

  // scanlines
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  for(let y=0; y<vh; y+=4) ctx.fillRect(0, y, vw, 1);
  ctx.restore();

  drawCursor(mx, my);
  requestAnimationFrame(loop);
}

document.addEventListener('click', () => {
  ctx.fillStyle = '#00ff18';
  ctx.globalAlpha = 0.7;
  ctx.fillRect(0,0,window.innerWidth,window.innerHeight);
  setTimeout(()=>{
    document.body.style.transition='opacity 0.6s';
    document.body.style.opacity='0';
    setTimeout(()=>window.location.href='home.html',650);
  },60);
});

  // ── Content Protection ───────────────────────────────
  (function() {
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('dragstart', e => {
      if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO') e.preventDefault();
    });
    document.addEventListener('keydown', e => {
      if (
        (e.ctrlKey && (e.key === 's' || e.key === 'u' || e.key === 'p')) ||
        (e.ctrlKey && e.shiftKey && (e.key === 'i' || e.key === 'j' || e.key === 'c')) ||
        e.key === 'F12'
      ) { e.preventDefault(); }
    });
    document.addEventListener('selectstart', e => e.preventDefault());
  })();
